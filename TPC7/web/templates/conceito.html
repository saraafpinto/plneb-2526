{% extends 'layout.html' %}

{% block head %}
    <title>{{ designacao }} - Detalhe</title>
    <style>
        .concept-header {
            background: linear-gradient(120deg, #0d6efd 0%, #0056b3 100%);
            color: white;
            padding: 40px 0;
            border-radius: 0 0 2rem 2rem;
            margin-bottom: 3rem;
        }
        .description-box {
            background: #ffffff;
            border-left: 5px solid #0d6efd;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #333;
        }
        .back-button {
            transition: 0.3s;
        }
        .back-button:hover {
            transform: translateX(-5px);
        }
    </style>
{% endblock %}

{% block body %}
<div class="concept-header shadow">
    <div class="container text-center">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb justify-content-center">
                <li class="breadcrumb-item"><a href="/" class="text-white-50 text-decoration-none">Home</a></li>
                <li class="breadcrumb-item"><a href="/conceitos" class="text-white-50 text-decoration-none">Glossário</a></li>
                <li class="breadcrumb-item active text-white" aria-current="page">Detalhe</li>
            </ol>
        </nav>
        <h1 class="display-3 fw-bold mt-3">{{ designacao }}</h1>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 description-box p-4 p-md-5 mb-5 rounded-4">
                <div class="d-flex align-items-center mb-4">
                    <span class="badge bg-primary-subtle text-primary px-3 py-2 rounded-pill fw-bold">
                        Definição Técnica
                    </span>
                </div>
                
                <p class="lead">
                    {{ descricao }}
                </p>
                
                <hr class="my-4 text-muted opacity-25">
                
                <div class="d-flex justify-content-between align-items-center mt-4">
                    <a href="/conceitos" class="btn btn-outline-secondary back-button rounded-pill px-4">
                        &larr; Voltar à Lista
                    </a>
                    
                    <small class="text-muted italic">
                        Fonte: Dicionário Médico PLN
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
